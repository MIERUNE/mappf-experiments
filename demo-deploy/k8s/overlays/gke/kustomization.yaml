apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: map-demo

resources:
  - healthcheck.yaml
  - httproute.yaml
  - podmonitoring.yaml
  - hpa.yaml
  - ../../base

images:
  - name: ishikari
    newName: asia-northeast1-docker.pkg.dev/mappf-experiment/ishikari/ishikari
    digest: sha256:1c69a4e4c0b4f436372e1af83aba01b232ab982ada912b5cace9342acc3d28bb

patches:
  - path: patch-serviceaccount.yaml
  - path: patch-deployment.yaml
  # The HPA owns replica count; drop the base Deployment's fixed replicas so
  # `kubectl apply` doesn't reset the autoscaler's decision on every deploy.
  - target:
      kind: Deployment
      name: ishikari
    patch: |-
      - op: remove
        path: /spec/replicas
