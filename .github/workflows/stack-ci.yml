name: Stack CI

on:
  pull_request:
    paths:
      - "kustomization.yaml"
      - "deploy/**"
      - "integration/**"
      - "demo-deploy/**/runtime/k8s/**"
      - ".github/workflows/stack-ci.yml"
  push:
    branches:
      - main
    paths:
      - "kustomization.yaml"
      - "deploy/**"
      - "integration/**"
      - "demo-deploy/**/runtime/k8s/**"
      - ".github/workflows/stack-ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manifests:
    name: Combined deployment manifests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.0

      - name: Check shell syntax
        run: bash -n integration/check-stack-manifests.sh

      - name: Check cross-service manifest contracts
        run: bash integration/check-stack-manifests.sh
