[workspace]
members = ["biei", "biei-sim"]
default-members = ["biei"]
resolver = "3"

[workspace.dependencies]
anyhow = "1"
ab_glyph = "0.2"
async-trait = "0.1"
axum = "0.8"
bytes = "1"
chitchat = "0.11"
clap = { version = "4.6", features = ["derive", "env"] }
flate2 = { version = "1", default-features = false, features = ["zlib-ng"] }
humantime = "2"
image = "0.25"
maplibre_native = { version = "0.8.3", default-features = false, features = ["json", "geojson", "log"] }
moka = { version = "0.12", features = ["sync"] }
rand = "0.10.1"
rand_distr = "0.6"
rand_xoshiro = "0.8"
prometheus = "0.14"
reqwest = { version = "0.13", default-features = false, features = ["rustls", "http2"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny-skia = "0.12"
tokio = { version = "1", features = ["full", "test-util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2.5"
webp = { version = "0.3", default-features = false }

[profile.dev.package."*"]
opt-level = 1
