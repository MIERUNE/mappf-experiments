apiVersion: apps/v1
kind: Deployment
metadata:
  name: ishikari
  labels:
    app: ishikari
spec:
  # 3-node gossip cluster. Deployment (not StatefulSet): chitchat membership is
  # dynamic, so pods need no stable identity or ordered startup.
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: ishikari
  template:
    metadata:
      labels:
        app: ishikari
    spec:
      serviceAccountName: ishikari
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 25
      containers:
        - name: ishikari
          image: ishikari:dev
          imagePullPolicy: IfNotPresent
          args:
            - --gossip-seeds
            - ishikari-gossip:7946
          ports:
            - name: http
              containerPort: 8080
            - name: internal
              containerPort: 9090
            - name: gossip
              containerPort: 7946
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ISKR_NODE_ID
              value: "$(POD_NAME)"
            - name: ISKR_HTTP_PORT
              value: "8080"
            - name: ISKR_INTERNAL_HTTP_PORT
              value: "9090"
            - name: ISKR_GOSSIP_BIND
              value: "0.0.0.0:7946"
            - name: ISKR_GOSSIP_ADVERTISE_ADDR
              value: "$(POD_IP):7946"
            - name: ISKR_INTERNAL_HTTP_ADVERTISE_ADDR
              value: "$(POD_IP):9090"
            - name: ISKR_TILESET_SOURCES
              value: "https://REPLACE-ME.example.com/"
            - name: RUST_LOG
              value: "ishikari=info"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
