# Autoscale the tile provider on CPU. Ishikari's serving cost is dominated by
# chunk fetch/decompress + HTTP serving (CPU tracks QPS well); retained material
# cache weight is bounded, while transient memory is protected by admission and
# the pod limit rather than used as a scaling signal. Peer routing (HRW) redistributes
# tile ownership automatically as replicas join and leave.
#
# The GKE overlay drops the Deployment's fixed `spec.replicas` (see
# kustomization.yaml) so repeated `kubectl apply` does not fight the HPA.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ishikari
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ishikari
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # Scale-in evicts a node's chunk/tile caches; keep it slow so bursty
      # traffic doesn't thrash cache warmth.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
