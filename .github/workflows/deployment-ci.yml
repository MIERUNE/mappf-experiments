name: Deployment CI

on:
  push:
    branches:
      - main
    paths:
      - "demo-deploy/**"
      - ".github/workflows/deployment-ci.yml"
  pull_request:
    paths:
      - "demo-deploy/**"
      - ".github/workflows/deployment-ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manifests:
    name: Rendered manifest contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Verify kubectl client
        run: kubectl version --client

      - name: Render manifests and check cluster contracts
        run: bash demo-deploy/check-manifests.sh
