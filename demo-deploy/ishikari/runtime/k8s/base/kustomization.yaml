apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The `map-demo` namespace is owned by `demo-deploy/platform` (applied once per
# cluster); this overlay only stamps resources into it.
namespace: map-demo

resources:
  - serviceaccount.yaml
  - deployment.yaml
  - pdb.yaml
  - service-gossip.yaml
  - service-http.yaml
