<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>__TITLE__ - Ishikari preview</title>
        <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@__MAPLIBRE_GL_VERSION__/dist/maplibre-gl.css" />
        <style>
            html,
            body,
            #map {
                height: 100%;
                margin: 0;
            }
            .overlay {
                position: absolute;
                top: 12px;
                left: 12px;
                z-index: 1;
                background: rgba(255, 255, 255, 0.92);
                padding: 8px 10px;
                border-radius: 6px;
                font: 12px/1.4 sans-serif;
                box-sizing: border-box;
                max-width: calc(100vw - 76px);
            }
            .preview-controls {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-top: 7px;
            }
            .preview-segmented {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                overflow: hidden;
                border: 1px solid #b8bec1;
                border-radius: 5px;
            }
            .preview-segmented button {
                min-height: 28px;
                border: 0;
                border-right: 1px solid #b8bec1;
                padding: 3px 9px;
                background: #fff;
                color: #30373a;
                cursor: pointer;
                font: inherit;
                white-space: nowrap;
            }
            .preview-segmented button:last-child {
                border-right: 0;
            }
            .preview-segmented button[aria-pressed="true"] {
                background: #2f5550;
                color: #fff;
            }
            .preview-switch {
                display: inline-flex;
                min-height: 28px;
                align-items: center;
                gap: 5px;
                padding: 0 7px;
                border: 1px solid #b8bec1;
                border-radius: 5px;
                background: #fff;
                color: #30373a;
                cursor: pointer;
                white-space: nowrap;
            }
            .preview-switch input {
                margin: 0;
            }
            @media (max-width: 560px) {
                .preview-controls {
                    flex-direction: column;
                    align-items: stretch;
                    gap: 6px;
                }
                .preview-segmented button {
                    padding-right: 5px;
                    padding-left: 5px;
                    white-space: normal;
                }
                .preview-switch {
                    width: fit-content;
                }
            }
            .feature-popup .maplibregl-popup-content {
                max-width: 320px;
                padding: 8px 10px;
                font: 11px/1.35 monospace;
                background: rgba(255, 255, 255, 0.72);
                border: 1px solid rgba(255, 255, 255, 0.45);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
                backdrop-filter: blur(10px) saturate(1.1);
                -webkit-backdrop-filter: blur(10px) saturate(1.1);
            }
            .feature-popup .maplibregl-popup-tip {
                border-top-color: rgba(255, 255, 255, 0.72);
                border-bottom-color: rgba(255, 255, 255, 0.72);
            }
            .feature-popup h3 {
                margin: 0 0 6px;
                font: 600 12px/1.3 sans-serif;
            }
            .feature-popup .geometry-type {
                margin-left: 6px;
                color: rgba(0, 0, 0, 0.48);
                font: 400 11px/1.3 sans-serif;
            }
            .feature-popup table {
                width: 100%;
                border-collapse: collapse;
            }
            .feature-popup .feature-item + .feature-item {
                margin-top: 8px;
                padding-top: 8px;
                border-top: 1px solid rgba(0, 0, 0, 0.1);
            }
            .feature-popup td {
                padding: 0;
                vertical-align: top;
                word-break: normal;
                overflow-wrap: normal;
                hyphens: none;
            }
            .feature-popup td:first-child {
                width: 42%;
                padding-right: 8px;
                color: #555;
            }
        </style>
    </head>
    <body>
        <div class="overlay"><strong>__TITLE__</strong></div>
        <div id="map"></div>
        <script type="module">
            // maplibre-gl 6.x is ESM-only (no UMD global) and exposes named
            // exports, so import the namespace as `maplibregl`.
            import * as maplibregl from "https://unpkg.com/maplibre-gl@__MAPLIBRE_GL_VERSION__/dist/maplibre-gl.mjs";
            const TERRAIN_PRODUCTS = __TERRAIN_PRODUCTS__;
            const map = new maplibregl.Map({
                container: "map",
                style: "__STYLE_URL__",
                hash: true,
            });
            window.__map = map;
            const popup = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false,
                className: "feature-popup",
                offset: 8,
            });
            let hoveredFeatures = [];
            map.addControl(new maplibregl.NavigationControl(), "top-right");
            map.addControl(new maplibregl.GlobeControl(), "top-right");
            __TERRAIN_CONTROL__

            if (TERRAIN_PRODUCTS) {
                const overlay = document.querySelector(".overlay") || document.body;
                const controls = document.createElement("div");
                controls.className = "preview-controls";

                const segmented = document.createElement("div");
                segmented.className = "preview-segmented";
                segmented.setAttribute("role", "group");
                segmented.setAttribute("aria-label", "Terrain display");
                controls.appendChild(segmented);

                // Persist the chosen terrain mode (and isolines) in the URL
                // query so a view is shareable and survives reload. MapLibre's
                // `hash: true` owns the `#...` fragment; the query is separate,
                // so the two coexist.
                const TERRAIN_MODES = [
                    "hillshade",
                    "vector",
                    "raster-lossless",
                    "raster-lossy",
                    "raster-jpeg",
                    "raw",
                ];
                const initialParams = new URLSearchParams(window.location.search);
                const requestedMode = initialParams.get("hillshade");
                let terrainMode = TERRAIN_MODES.includes(requestedMode)
                    ? requestedMode
                    : "hillshade";
                let isolinesEnabled = initialParams.get("isolines") === "true";
                const syncUrl = () => {
                    const params = new URLSearchParams(window.location.search);
                    if (terrainMode === "hillshade") params.delete("hillshade");
                    else params.set("hillshade", terrainMode);
                    if (isolinesEnabled) params.set("isolines", "true");
                    else params.delete("isolines");
                    const query = params.toString();
                    const next =
                        window.location.pathname +
                        (query ? "?" + query : "") +
                        window.location.hash;
                    window.history.replaceState(window.history.state, "", next);
                };
                const modeButtons = [];
                const layerVisibility = (layerId, visible) => {
                    if (map.getLayer(layerId)) {
                        map.setLayoutProperty(layerId, "visibility", visible ? "visible" : "none");
                    }
                };
                const applyTerrainDisplay = () => {
                    layerVisibility("raw-raster", terrainMode === "raw");
                    layerVisibility("raster-hillshade", terrainMode === "hillshade");
                    layerVisibility("vector-hillshade-shadow", terrainMode === "vector");
                    layerVisibility("vector-hillshade-highlight", terrainMode === "vector");
                    layerVisibility("shade-webp-lossless", terrainMode === "raster-lossless");
                    layerVisibility("shade-webp-lossy", terrainMode === "raster-lossy");
                    layerVisibility("shade-jpeg", terrainMode === "raster-jpeg");
                    layerVisibility("isolines", isolinesEnabled);
                    layerVisibility("isoline-labels", isolinesEnabled);
                    modeButtons.forEach((button) =>
                        button.setAttribute("aria-pressed", String(button.dataset.mode === terrainMode)),
                    );
                };

                for (const [mode, label] of [
                    ["hillshade", "Hillshade"],
                    ["vector", "Vector hillshade"],
                    ["raster-lossless", "Raster (WebP lossless)"],
                    ["raster-lossy", "Raster (WebP lossy)"],
                    ["raster-jpeg", "Raster (JPEG)"],
                    ["raw", "Raw raster"],
                ]) {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.textContent = label;
                    button.dataset.mode = mode;
                    button.setAttribute("aria-pressed", String(mode === terrainMode));
                    button.addEventListener("click", () => {
                        terrainMode = mode;
                        applyTerrainDisplay();
                        syncUrl();
                    });
                    modeButtons.push(button);
                    segmented.appendChild(button);
                }

                const isolineSwitch = document.createElement("label");
                isolineSwitch.className = "preview-switch";
                const isolineInput = document.createElement("input");
                isolineInput.type = "checkbox";
                isolineInput.checked = isolinesEnabled;
                isolineInput.addEventListener("change", () => {
                    isolinesEnabled = isolineInput.checked;
                    applyTerrainDisplay();
                    syncUrl();
                });
                isolineSwitch.append(isolineInput, document.createTextNode("Isolines"));
                controls.appendChild(isolineSwitch);
                overlay.appendChild(controls);
                map.on("load", applyTerrainDisplay);
            }

            const overlay = document.querySelector(".overlay") || document.body;
            const debugControls = document.createElement("div");
            debugControls.className = "preview-controls";
            const tileBoundarySwitch = document.createElement("label");
            tileBoundarySwitch.className = "preview-switch";
            const tileBoundaryInput = document.createElement("input");
            tileBoundaryInput.type = "checkbox";
            tileBoundaryInput.checked = true;
            const applyTileBoundaries = () => {
                map.showTileBoundaries = tileBoundaryInput.checked;
            };
            tileBoundaryInput.addEventListener("change", applyTileBoundaries);
            tileBoundarySwitch.append(tileBoundaryInput, document.createTextNode("Tile boundaries"));
            debugControls.appendChild(tileBoundarySwitch);
            overlay.appendChild(debugControls);
            applyTileBoundaries();

            // MVT/MLT tile-format toggle (vector previews only). Reloads the
            // style with the source pointed at `?encoding=mvt|mlt`.
            const FORMAT_TOGGLE = __FORMAT_TOGGLE__;
            if (FORMAT_TOGGLE) {
                const styleUrlFor = (fmt) => {
                    const u = new URL("__STYLE_URL__", location.href);
                    u.searchParams.set("encoding", fmt);
                    return u.toString();
                };
                const ctrl = document.createElement("div");
                ctrl.style.cssText = "display:flex;align-items:center;gap:6px;margin-top:6px";
                const label = document.createElement("span");
                label.textContent = "encoding:";
                label.style.color = "#555";
                ctrl.appendChild(label);
                const buttons = [];
                const mark = (fmt) =>
                    buttons.forEach((b) => {
                        const on = b.dataset.fmt === fmt;
                        b.style.background = on ? "#2c7" : "#fff";
                        b.style.color = on ? "#fff" : "#000";
                        b.style.borderColor = on ? "#2c7" : "#ccc";
                    });
                for (const [fmt, text] of [
                    ["mvt", "MVT"],
                    ["mlt", "MLT (on-the-fly)"],
                ]) {
                    const b = document.createElement("button");
                    b.textContent = text;
                    b.dataset.fmt = fmt;
                    b.style.cssText =
                        "border:1px solid #ccc;background:#fff;border-radius:4px;padding:2px 8px;cursor:pointer;font:inherit";
                    b.addEventListener("click", () => {
                        map.setStyle(styleUrlFor(fmt));
                        mark(fmt);
                    });
                    buttons.push(b);
                    ctrl.appendChild(b);
                }
                (document.querySelector(".overlay") || document.body).appendChild(ctrl);
                const current =
                    new URL("__STYLE_URL__", location.href).searchParams.get("encoding") === "mlt"
                        ? "mlt"
                        : "mvt";
                mark(current);
            }

            function escapeHtml(value) {
                return String(value)
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;")
                    .replaceAll("'", "&#39;");
            }

            function popupFeatureHtml(feature) {
                const properties = feature.properties ?? {};
                const title = escapeHtml(feature.sourceLayer ?? "feature");
                const geometryType = escapeHtml(feature.geometry?.type ?? "");
                const rows = [["id", feature.id ?? ""], ...Object.entries(properties)]
                    .map(([key, value]) => `<tr><td>${escapeHtml(key)}</td><td>${escapeHtml(value ?? "")}</td></tr>`)
                    .join("");
                return `<div class="feature-item"><h3>${title}<span class="geometry-type">${geometryType}</span></h3><table>${rows}</table></div>`;
            }

            function popupHtml(features) {
                return features.map((feature) => popupFeatureHtml(feature)).join("");
            }

            function popupFeatureKey(feature) {
                return [
                    feature.source ?? "",
                    feature.sourceLayer ?? "",
                    feature.id ?? "",
                    feature.geometry?.type ?? "",
                ].join("\u0000");
            }

            function uniquePopupFeatures(features) {
                const seen = new Set();
                return features.filter((feature) => {
                    const key = popupFeatureKey(feature);
                    if (seen.has(key)) {
                        return false;
                    }
                    seen.add(key);
                    return true;
                });
            }

            function clearHoveredFeatures() {
                if (!hoveredFeatures.length) {
                    return;
                }
                for (const feature of hoveredFeatures) {
                    map.removeFeatureState(feature, "hover");
                }
                hoveredFeatures = [];
            }

            function hoveredFeatureKey(feature) {
                return [feature.source ?? "", feature.sourceLayer ?? "", feature.id ?? ""].join("\u0000");
            }

            function setHoveredFeatures(features) {
                clearHoveredFeatures();
                const seen = new Set();
                hoveredFeatures = features
                    .filter((feature) => feature.id !== undefined && feature.id !== null)
                    .filter((feature) => {
                        const key = hoveredFeatureKey(feature);
                        if (seen.has(key)) {
                            return false;
                        }
                        seen.add(key);
                        return true;
                    })
                    .map((feature) => ({
                        source: feature.source,
                        sourceLayer: feature.sourceLayer,
                        id: feature.id,
                    }));
                for (const feature of hoveredFeatures) {
                    map.setFeatureState(feature, { hover: true });
                }
            }

            map.on("mousemove", (event) => {
                const features = map
                    .queryRenderedFeatures(event.point)
                    .filter(
                        (candidate) =>
                            candidate.layer.id !== "background" && !candidate.layer.id.startsWith("hovered-feature"),
                    );
                if (!features.length) {
                    clearHoveredFeatures();
                    popup.remove();
                    map.getCanvas().style.cursor = "";
                    return;
                }

                setHoveredFeatures(features);
                map.getCanvas().style.cursor = "pointer";
                popup
                    .setLngLat(event.lngLat)
                    .setHTML(popupHtml(uniquePopupFeatures(features)))
                    .addTo(map);
            });

            map.on("mouseout", () => {
                clearHoveredFeatures();
                popup.remove();
                map.getCanvas().style.cursor = "";
            });
        </script>
    </body>
</html>
