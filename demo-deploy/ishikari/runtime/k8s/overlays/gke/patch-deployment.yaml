apiVersion: apps/v1
kind: Deployment
metadata:
  name: ishikari
spec:
  template:
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: ishikari
          imagePullPolicy: Always
          env:
            - name: ISKR_TILESET_SOURCES
              value: "gs://mappf-experiment-demo/tilesets"
            - name: ISKR_STYLE_TEMPLATES
              value: "gs://mappf-experiment-demo/styles/{style_id}/style.json"
            - name: ISKR_GLYPH_URL_TEMPLATE
              value: "gs://mappf-experiment-demo/fonts/{fontstack}/{range}.pbf"
            - name: ISKR_SPRITE_TEMPLATES
              value: "gs://mappf-experiment-demo/styles/{style_id}/sprite"
            # Mapterhorn composite: z<=12 from planet.pmtiles, z>12 from
            # 6-{x6}-{y6}.pmtiles detail archives (advertised to z16).
            - name: ISKR_MAPTERHORN_TILESET
              value: "mapterhorn/planet"
            - name: ISKR_MAPTERHORN_MAXZOOM
              value: "16"
            # Bound aggregate GCS range-read concurrency across all archives.
            - name: ISKR_BACKEND_FETCH_CONCURRENCY
              value: "32"
