apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Combined GKE demo stack. Service-owned overlays remain independently
# deployable; this root only composes their current pinned revisions with the
# shared namespace and Gateway.
resources:
  - demo-deploy/ishikari/runtime/k8s/platform
  - demo-deploy/ishikari/runtime/k8s/overlays/gke
  - demo-deploy/biei/runtime/k8s/overlays/gke
