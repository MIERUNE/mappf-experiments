apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: map-demo

resources:
  - healthcheck.yaml
  - httproute.yaml
  - podmonitoring.yaml
  - networkpolicy.yaml
  - hpa.yaml
  - ../../base

images:
  - name: biei
    newName: asia-northeast1-docker.pkg.dev/mappf-experiment/biei/biei
    digest: sha256:ff241ee94095708f3de8aea75dd0efdfd3f83cc288b9e3a2ffd4012bf468963f

patches:
  - path: patch-deployment.yaml
  # The HPA owns replica count; drop the base Deployment's fixed replicas so
  # `kubectl apply` doesn't reset the autoscaler's decision on every deploy.
  - target:
      kind: Deployment
      name: biei
    patch: |-
      - op: remove
        path: /spec/replicas
