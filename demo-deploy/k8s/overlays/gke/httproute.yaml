apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ishikari
spec:
  parentRefs:
    - name: demo-gw
  hostnames:
    - ishikari-demo.mierune.dev
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: ishikari
          port: 8080
