apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: map-demo

resources:
  - healthcheck.yaml
  - httproute.yaml
  - podmonitoring.yaml
  - networkpolicy.yaml
  - hpa.yaml
  - ../../base

images:
  - name: ishikari
    newName: asia-northeast1-docker.pkg.dev/mappf-experiment/ishikari/ishikari
    digest: sha256:f6ff987fdf875addc9fd8d620494fcde3003d8999638196ff68cffc656808315

patches:
  - path: patch-serviceaccount.yaml
  - path: patch-deployment.yaml
  # The HPA owns replica count; drop the base Deployment's fixed replicas so
  # `kubectl apply` doesn't reset the autoscaler's decision on every deploy.
  - target:
      kind: Deployment
      name: ishikari
    patch: |-
      - op: remove
        path: /spec/replicas
