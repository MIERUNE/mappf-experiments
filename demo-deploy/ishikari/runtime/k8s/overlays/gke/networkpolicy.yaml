apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ishikari-internal-boundary
spec:
  podSelector:
    matchLabels:
      app: ishikari
  policyTypes:
    - Ingress
  ingress:
    # Public HTTP and kubelet probes remain reachable through the normal
    # Service/Gateway path. Internal handlers are not mounted on this listener.
    - ports:
        - port: 8080
          protocol: TCP
    # Peer forwarding and gossip are limited to Ishikari pods in this namespace.
    - from:
        - podSelector:
            matchLabels:
              app: ishikari
      ports:
        - port: 9090
          protocol: TCP
        - port: 7946
          protocol: UDP
    # Google Managed Service for Prometheus scrapes the internal metrics port.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gke-gmp-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: collector
      ports:
        - port: 9090
          protocol: TCP
