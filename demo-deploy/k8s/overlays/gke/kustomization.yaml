apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: map-demo

resources:
  - healthcheck.yaml
  - httproute.yaml
  - podmonitoring.yaml
  - networkpolicy.yaml
  - hpa.yaml
  - ../../base

images:
  - name: biei
    newName: asia-northeast1-docker.pkg.dev/mappf-experiment/biei/biei
    digest: sha256:951155f92aed52f8cc48af69f689c3b23c6144fe5d6824ef9b4609b01fcc3b4d

patches:
  - path: patch-deployment.yaml
  # The HPA owns replica count; drop the base Deployment's fixed replicas so
  # `kubectl apply` doesn't reset the autoscaler's decision on every deploy.
  - target:
      kind: Deployment
      name: biei
    patch: |-
      - op: remove
        path: /spec/replicas
