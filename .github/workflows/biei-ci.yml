name: Biei CI

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/codecov.yml"
      - "crates/biei-core/**"
      - "crates/mmpf-auth/**"
      - "crates/mmpf-cluster/**"
      - "crates/mmpf-common/**"
      - "crates/mmpf-http/**"
      - "crates/mmpf-mln-filesource/**"
      - "servers/biei/**"
      - "sims/biei-sim/**"
      - "demo-deploy/biei/**"
      - ".github/workflows/biei-ci.yml"
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/codecov.yml"
      - "crates/biei-core/**"
      - "crates/mmpf-auth/**"
      - "crates/mmpf-cluster/**"
      - "crates/mmpf-common/**"
      - "crates/mmpf-http/**"
      - "crates/mmpf-mln-filesource/**"
      - "servers/biei/**"
      - "sims/biei-sim/**"
      - "demo-deploy/biei/**"
      - ".github/workflows/biei-ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MLN_PRECOMPILE: "1"

jobs:
  security:
    name: RustSec dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Audit Cargo.lock
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  rust:
    name: Rust workspace
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      # Fresh checkouts can make Cargo conservatively invoke rustc again. Cache
      # compiler outputs by content instead of fetching all Git history solely
      # to reconstruct source mtimes.
      CARGO_INCREMENTAL: "0"
      RUSTC_WORKSPACE_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libssl-dev libcurl4-openssl-dev \
            libjpeg-dev libpng-dev libwebp-dev \
            libgl1-mesa-dev libegl1-mesa-dev \
            libuv1-dev libicu-dev

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal \
            --component rustfmt --component clippy --component llvm-tools-preview
          rustup default stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov@0.8.6

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: v0.16.0

      # Keep dependency caching alongside sccache for MapLibre/native build
      # outputs and linking inputs that rustc's compiler cache does not cover.
      # rust-cache intentionally excludes workspace artifacts; sccache handles
      # content-identical workspace compilation after Cargo's freshness check.
      - name: Cache Cargo dependencies and native outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
          key: biei-gl-opengl-mln-precompile

      - name: Check formatting
        run: cargo fmt --all -- --check

      # cargo-llvm-cov runs the same test suite as cargo test. Keeping coverage
      # in this job avoids a second MapLibre Native build in a dedicated job.
      - name: Test workspace and collect coverage
        run: >-
          cargo llvm-cov --locked
          -p mmpf-auth -p mmpf-cluster -p mmpf-common -p mmpf-http -p mmpf-mln-filesource -p biei-core -p biei -p biei-sim
          --features biei/gl-opengl --lcov --output-path lcov-biei.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov-biei.info
          flags: biei,shared
          name: biei
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Lint workspace
        run: >-
          cargo clippy -p mmpf-auth -p mmpf-cluster -p mmpf-common -p mmpf-http -p mmpf-mln-filesource -p biei-core -p biei -p biei-sim
          --all-targets --locked --features biei/gl-opengl --
          -D warnings
          -D clippy::unchecked_time_subtraction
          -D clippy::large_futures
          -D clippy::large_stack_arrays
          -D clippy::unused_async
