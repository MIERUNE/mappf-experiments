name: Ishikari CI

on:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/ishikari-core/**"
      - "crates/mmpf-terrain/**"
      - "servers/ishikari/**"
      - "sims/ishikari-sim/**"
      - "demo-deploy/ishikari/**"
      - ".github/workflows/ishikari-ci.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/ishikari-core/**"
      - "crates/mmpf-terrain/**"
      - "servers/ishikari/**"
      - "sims/ishikari-sim/**"
      - "demo-deploy/ishikari/**"
      - ".github/workflows/ishikari-ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      # Reuse the Cargo registry and target graph across otherwise ephemeral
      # GitHub-hosted runners. Pin the v2 action to an immutable commit.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: >-
          cargo clippy -p ishikari-core -p ishikari -p ishikari-sim
          -p mmpf-terrain --all-targets --locked -- -D warnings
      - name: Test
        run: >-
          cargo test -p ishikari-core -p ishikari -p ishikari-sim
          -p mmpf-terrain --all-targets --locked
      - name: Test Ishikari without simulator support
        run: cargo test -p ishikari-core --all-targets --no-default-features --locked
