substitutions:
  _IMAGE: asia-northeast1-docker.pkg.dev/mappf-experiment/ishikari/ishikari:dev
  # Keep compiler layers separate from runtime image history so cleanup can
  # target superseded cache manifests without shortening the rollback window.
  _CACHE_IMAGE: asia-northeast1-docker.pkg.dev/mappf-experiment/ishikari/ishikari-buildcache:latest
options:
  machineType: E2_HIGHCPU_8
  diskSizeGb: 30
timeout: 1800s
steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
        docker buildx create --driver docker-container --use --name ishikari-builder
        docker buildx build \
          --file demo-deploy/ishikari/runtime/Dockerfile \
          --tag "${_IMAGE}" \
          --cache-from "type=registry,ref=${_CACHE_IMAGE}" \
          --cache-to "type=registry,ref=${_CACHE_IMAGE},mode=max,oci-mediatypes=true,image-manifest=true" \
          --push \
          .
