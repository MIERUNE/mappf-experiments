# Shared L7 Gateway (one external LB) for the demo. Apply once. App repos attach
# their own HTTPRoutes by parentRef (name: demo-gw). HTTPS uses the Certificate
# Manager map `mappf-demo-cert-map`.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-gw
  namespace: map-demo
  annotations:
    networking.gke.io/certmap: mappf-demo-cert-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  addresses:
    - type: NamedAddress
      value: mappf-demo-ingress
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: Same
