<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ishikari Simulator</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #18201f;
      --muted: #66706e;
      --line: #d8dedc;
      --surface: #ffffff;
      --canvas: #f4f6f5;
      --green: #087f5b;
      --cyan: #087f8c;
      --amber: #b25d00;
      --red: #b42318;
      --blue: #2458a6;
    }

    * { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }

    body {
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    header {
      background: #15201e;
      color: #f7faf9;
      border-bottom: 4px solid var(--green);
    }

    .header-inner, main {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
    }

    .header-inner {
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 22px; font-weight: 680; }
    h2 { font-size: 16px; font-weight: 680; }
    h3 { font-size: 13px; font-weight: 680; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .tag {
      border: 1px solid #53615e;
      border-radius: 4px;
      color: #dce5e2;
      padding: 4px 8px;
      white-space: nowrap;
    }

    main { padding: 24px 0 48px; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 6px;
      overflow: hidden;
    }

    .kpi {
      min-width: 0;
      padding: 14px 16px;
      border-right: 1px solid var(--line);
    }
    .kpi:last-child { border-right: 0; }
    .kpi-label { color: var(--muted); font-size: 12px; }
    .kpi-value {
      display: block;
      margin-top: 3px;
      font-size: 20px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    section { margin-top: 24px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .chart {
      min-width: 0;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .chart-wide { grid-column: 1 / -1; }

    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }
    .legend-item::before {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-right: 5px;
      border-radius: 2px;
      background: var(--legend-color);
      content: "";
    }

    canvas {
      display: block;
      width: 100%;
      height: 220px;
      margin-top: 8px;
    }

    .node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }

    .node {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--green);
      border-radius: 6px;
      background: var(--surface);
    }
    .node.inactive { border-left-color: #aab2b0; color: var(--muted); }
    .node.new { border-left-color: var(--cyan); }
    .node-row { display: flex; justify-content: space-between; gap: 8px; }
    .node-value { margin-top: 8px; font-size: 18px; font-variant-numeric: tabular-nums; }
    .bar { height: 5px; margin-top: 8px; background: #e8eceb; overflow: hidden; }
    .bar > span { display: block; height: 100%; background: var(--green); }

    .events-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    th { color: var(--muted); font-size: 12px; font-weight: 600; }
    tr:last-child td { border-bottom: 0; }
    .empty { padding: 20px; color: var(--muted); }

    @media (max-width: 1250px) {
      .kpis { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .kpi { border-bottom: 1px solid var(--line); }
      .kpi:nth-child(5n) { border-right: 0; }
      .kpi:nth-last-child(-n+5) { border-bottom: 0; }
      .chart-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .header-inner, main { width: min(100% - 20px, 1440px); }
      .header-inner { align-items: flex-start; flex-direction: column; padding: 16px 0; gap: 10px; }
      .meta { justify-content: flex-start; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .kpi { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
      .kpi:nth-child(5n) { border-right: 1px solid var(--line); }
      .kpi:nth-child(2n) { border-right: 0; }
      .kpi:nth-last-child(-n+5) { border-bottom: 1px solid var(--line); }
      .kpi:nth-last-child(-n+2) { border-bottom: 0; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>Ishikari Simulator</h1>
        <p id="traceLabel"></p>
      </div>
      <div class="meta" id="meta"></div>
    </div>
  </header>

  <main>
    <div class="kpis" id="kpis"></div>

    <section>
      <div class="section-head"><h2>System Trends</h2></div>
      <div class="chart-grid">
        <div class="chart">
          <h3>Tile Source Rate</h3>
          <div class="chart-legend">
            <span class="legend-item" style="--legend-color:#087f5b">Self cache</span>
            <span class="legend-item" style="--legend-color:#087f8c">Peer cache</span>
            <span class="legend-item" style="--legend-color:#2458a6">Peer backend</span>
            <span class="legend-item" style="--legend-color:#b25d00">Self backend</span>
            <span class="legend-item" style="--legend-color:#b42318">Miss</span>
          </div>
          <canvas id="sourceChart"></canvas>
        </div>
        <div class="chart">
          <h3>Backend Fetches per 1k Requests</h3>
          <div class="chart-legend">
            <span class="legend-item" style="--legend-color:#b25d00">Range fetches</span>
          </div>
          <canvas id="backendChart"></canvas>
        </div>
        <div class="chart">
          <h3>Active Cache Occupancy</h3>
          <div class="chart-legend">
            <span class="legend-item" style="--legend-color:#087f8c">Tile cache</span>
            <span class="legend-item" style="--legend-color:#b42318">Chunk cache</span>
          </div>
          <canvas id="cacheChart"></canvas>
        </div>
        <div class="chart chart-wide">
          <h3>Transfer Volume per 1k Requests</h3>
          <div class="chart-legend">
            <span class="legend-item" style="--legend-color:#087f8c">Client egress</span>
            <span class="legend-item" style="--legend-color:#b25d00">Backend fetched</span>
          </div>
          <canvas id="transferChart"></canvas>
        </div>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2>Final Node State</h2>
        <span id="activeNodeCount"></span>
      </div>
      <div class="node-grid" id="nodes"></div>
    </section>

    <section>
      <div class="section-head"><h2>Churn Events</h2></div>
      <div class="events-wrap" id="events"></div>
    </section>
  </main>

  <script id="reportData" type="application/json">__ISHIKARI_REPORT_JSON__</script>
  <script>
    (() => {
      "use strict";
      const report = JSON.parse(document.getElementById("reportData").textContent);
      const result = report.result || {};
      const churn = report.churn || {};
      const events = churn.events || [];
      const finalFallback = {
        at_request: result.requests || 0,
        reason: "final",
        requests: result.requests || 0,
        active_nodes: (result.nodes || []).filter((node) => node.active !== false).length,
        by_source: result.by_source || {},
        node_requests: Object.fromEntries((result.nodes || []).filter((node) => node.active !== false).map((node) => [node.id, node.requests || 0])),
        peer_requests: result.peer_requests || 0,
        backend_fetches: (result.metrics || {}).backend_fetches || 0,
        backend_bytes: result.backend_bytes || 0,
        served_bytes: result.served_bytes || 0,
        tile_cache_bytes: result.tile_cache_bytes || 0,
        chunk_cache_bytes: result.chunk_cache_bytes || 0
      };
      const samples = churn.samples && churn.samples.length ? churn.samples : [finalFallback];
      const allNodeIds = Array.from(new Set([
        ...(result.nodes || []).map((node) => node.id),
        ...events.map((event) => event.node_id),
        ...samples.flatMap((sample) => Object.keys(sample.node_requests || {}))
      ])).sort(nodeSort);
      const rates = deriveRates(samples);
      const churnMarkers = groupChurnEvents(events);

      renderStatic();
      window.addEventListener("resize", debounce(drawCharts, 80));

      function renderStatic() {
        const trace = report.trace || {};
        document.getElementById("traceLabel").textContent = trace.kind === "replay"
          ? String(trace.input || "Replay trace")
          : String(trace.output || "Generated trace");
        const tags = [
          report.execution_mode || "simulation",
          `${report.cache_mode || "real"} cache`,
          `${number((report.cluster || {}).node_count || 0)} initial nodes`
        ];
        document.getElementById("meta").innerHTML = tags.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
        renderKpis();
        renderEvents();
        renderNodes(samples[samples.length - 1]);
        drawCharts();
      }

      function renderKpis() {
        const backendDuration = ((result.scheduler || {}).backend_fetch_duration_ms || {});
        const nodeLoad = result.node_request_load || {};
        const values = [
          ["Requests", number(result.requests || 0)],
          ["Client egress", bytes(result.served_bytes || 0)],
          ["Cache hit rate", percent(result.cache_hit_rate ?? result.l1_cache_hit_rate ?? 0)],
          ["Peer forward rate", percent(result.peer_forward_rate || 0)],
          ["Backend fetched", bytes(result.backend_bytes || 0)],
          ["Peer transfer", bytes(result.peer_bytes || 0)],
          ["Read amplification", `${fixed(result.read_amplification || 0, 2)}x`],
          ["Range fetches", number((result.metrics || {}).backend_fetches || 0)],
          ["Backend fetch mean", `${fixed(backendDuration.mean || 0, 1)} ms`],
          ["Node load max/mean", `${fixed(nodeLoad.max_to_mean || 0, 2)}x`]
        ];
        document.getElementById("kpis").innerHTML = values.map(([label, value]) =>
          `<div class="kpi"><span class="kpi-label">${label}</span><strong class="kpi-value" title="${escapeHtml(value)}">${escapeHtml(value)}</strong></div>`
        ).join("");
      }

      function renderNodes(sample) {
        const requests = sample.node_requests || {};
        const maxRequests = Math.max(1, ...Object.values(requests));
        document.getElementById("activeNodeCount").textContent = `${number(sample.active_nodes || Object.keys(requests).length)} active`;
        document.getElementById("nodes").innerHTML = allNodeIds.map((id) => {
          const active = Object.prototype.hasOwnProperty.call(requests, id);
          const addedNow = events.some((event) => event.action === "add" && event.node_id === id && event.applied_at_request === sample.at_request && sample.reason === "post_event");
          const value = active ? Number(requests[id] || 0) : 0;
          const width = active ? Math.max(1, value / maxRequests * 100) : 0;
          const classes = ["node", active ? "" : "inactive", addedNow ? "new" : ""].filter(Boolean).join(" ");
          return `<div class="${classes}">
            <div class="node-row"><h3>${escapeHtml(id)}</h3><span>${active ? "active" : "inactive"}</span></div>
            <div class="node-value">${active ? number(value) : "-"}</div>
            <div class="kpi-label">cumulative requests</div>
            <div class="bar"><span style="width:${width.toFixed(2)}%"></span></div>
          </div>`;
        }).join("");
      }

      function renderEvents() {
        const root = document.getElementById("events");
        if (!events.length) {
          root.innerHTML = '<div class="empty">No churn events</div>';
          return;
        }
        root.innerHTML = `<table>
          <thead><tr><th>Action</th><th>Node</th><th>Requested at</th><th>Applied at</th><th>Active nodes</th></tr></thead>
          <tbody>${events.map((event) => `<tr>
            <td>${escapeHtml(event.action)}</td><td>${escapeHtml(event.node_id)}</td>
            <td>${number(event.requested_at_request)}</td><td>${number(event.applied_at_request)}</td><td>${number(event.active_nodes)}</td>
          </tr>`).join("")}</tbody>
        </table>`;
      }

      function deriveRates(input) {
        let previous = null;
        let last = {
          selfCache: 0,
          peerCache: 0,
          peerBackend: 0,
          selfBackend: 0,
          miss: 0,
          backend: 0,
          clientMib: 0,
          backendMib: 0
        };
        return input.map((sample) => {
          if (previous && sample.requests > previous.requests) {
            const deltaRequests = sample.requests - previous.requests;
            const source = sample.by_source || {};
            const previousSource = previous.by_source || {};
            last = {
              selfCache: ((source.self_cache || 0) - (previousSource.self_cache || 0)) / deltaRequests * 100,
              peerCache: ((source.peer_cache || 0) - (previousSource.peer_cache || 0)) / deltaRequests * 100,
              peerBackend: ((source.peer_backend || 0) - (previousSource.peer_backend || 0)) / deltaRequests * 100,
              selfBackend: ((source.self_backend || 0) - (previousSource.self_backend || 0)) / deltaRequests * 100,
              miss: (
                (source.miss || 0) + (source.self_miss || 0) + (source.negative_cache || 0)
                - (previousSource.miss || 0) - (previousSource.self_miss || 0) - (previousSource.negative_cache || 0)
              ) / deltaRequests * 100,
              backend: ((sample.backend_fetches || 0) - (previous.backend_fetches || 0)) / deltaRequests * 1000,
              clientMib: ((sample.served_bytes || 0) - (previous.served_bytes || 0)) / deltaRequests * 1000 / 1048576,
              backendMib: ((sample.backend_bytes || 0) - (previous.backend_bytes || 0)) / deltaRequests * 1000 / 1048576
            };
            previous = sample;
          } else if (!previous) {
            previous = sample;
          }
          return last;
        });
      }

      function groupChurnEvents(input) {
        const grouped = new Map();
        for (const event of input) {
          const at = Number(event.applied_at_request || 0);
          const marker = grouped.get(at) || {at, adds: 0, removes: 0};
          if (event.action === "add") marker.adds += 1;
          if (event.action === "remove") marker.removes += 1;
          grouped.set(at, marker);
        }
        return Array.from(grouped.values()).sort((a, b) => a.at - b.at);
      }

      function drawCharts() {
        drawLineChart(document.getElementById("sourceChart"), [
          {color: "#087f5b", fill: "rgba(8,127,91,0.78)", values: rates.map((item) => item.selfCache)},
          {color: "#087f8c", fill: "rgba(8,127,140,0.74)", values: rates.map((item) => item.peerCache)},
          {color: "#2458a6", fill: "rgba(36,88,166,0.72)", values: rates.map((item) => item.peerBackend)},
          {color: "#b25d00", fill: "rgba(178,93,0,0.72)", values: rates.map((item) => item.selfBackend)},
          {color: "#b42318", fill: "rgba(180,35,24,0.72)", values: rates.map((item) => item.miss)}
        ], (value) => `${fixed(value, 0)}%`, {stacked: true, maxValue: 100});
        drawLineChart(document.getElementById("backendChart"), [
          {color: "#b25d00", values: rates.map((item) => item.backend)}
        ], (value) => fixed(value, value < 10 ? 1 : 0));
        drawLineChart(document.getElementById("cacheChart"), [
          {color: "#087f8c", values: samples.map((item) => (item.tile_cache_bytes || 0) / 1073741824)},
          {color: "#b42318", values: samples.map((item) => (item.chunk_cache_bytes || 0) / 1073741824)}
        ], (value) => `${fixed(value, 1)} GiB`);
        drawLineChart(document.getElementById("transferChart"), [
          {color: "#087f8c", values: rates.map((item) => item.clientMib)},
          {color: "#b25d00", values: rates.map((item) => item.backendMib)}
        ], (value) => `${fixed(value, 0)} MiB`);
      }

      function drawLineChart(canvas, series, formatY, options = {}) {
        const rect = canvas.getBoundingClientRect();
        if (!rect.width) return;
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        const width = rect.width;
        const height = rect.height;
        const pad = {left: 48, right: 12, top: 22, bottom: 28};
        const plotWidth = width - pad.left - pad.right;
        const plotHeight = height - pad.top - pad.bottom;
        const maxValue = options.maxValue || Math.max(1, ...series.flatMap((item) => item.values).filter(Number.isFinite));
        const requestMax = Math.max(1, samples[samples.length - 1].at_request || 0);

        ctx.clearRect(0, 0, width, height);
        ctx.strokeStyle = "#d8dedc";
        ctx.fillStyle = "#66706e";
        ctx.font = "11px ui-sans-serif, system-ui, sans-serif";
        ctx.lineWidth = 1;
        for (let line = 0; line <= 4; line += 1) {
          const y = pad.top + plotHeight * line / 4;
          ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(width - pad.right, y); ctx.stroke();
          const value = maxValue * (1 - line / 4);
          ctx.fillText(formatY(value), 2, y + 4);
        }
        ctx.fillText("0", pad.left, height - 7);
        const maxLabel = compact(requestMax);
        ctx.fillText(maxLabel, width - pad.right - ctx.measureText(maxLabel).width, height - 7);

        if (options.stacked) {
          let lower = new Array(samples.length).fill(0);
          for (const item of series) {
            const upper = item.values.map((value, index) => lower[index] + (Number.isFinite(value) ? value : 0));
            ctx.beginPath();
            upper.forEach((value, index) => {
              const x = pad.left + (samples[index].at_request || 0) / requestMax * plotWidth;
              const y = pad.top + plotHeight - value / maxValue * plotHeight;
              if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            for (let index = lower.length - 1; index >= 0; index -= 1) {
              const x = pad.left + (samples[index].at_request || 0) / requestMax * plotWidth;
              const y = pad.top + plotHeight - lower[index] / maxValue * plotHeight;
              ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = item.fill || item.color;
            ctx.fill();
            ctx.strokeStyle = item.color;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            upper.forEach((value, index) => {
              const x = pad.left + (samples[index].at_request || 0) / requestMax * plotWidth;
              const y = pad.top + plotHeight - value / maxValue * plotHeight;
              if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
            lower = upper;
          }
        } else {
          for (const item of series) {
            ctx.strokeStyle = item.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            item.values.forEach((value, index) => {
              if (!Number.isFinite(value)) return;
              const x = pad.left + (samples[index].at_request || 0) / requestMax * plotWidth;
              const y = pad.top + plotHeight - value / maxValue * plotHeight;
              if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
            });
            ctx.stroke();
          }
        }

        drawChurnMarkers(ctx, churnMarkers, requestMax, pad, plotWidth, plotHeight);
      }

      function drawChurnMarkers(ctx, markers, requestMax, pad, plotWidth, plotHeight) {
        for (const marker of markers) {
          if (marker.at > requestMax) continue;
          const x = pad.left + marker.at / requestMax * plotWidth;
          const color = marker.removes > 0 ? "#b42318" : "#087f8c";
          const parts = [];
          if (marker.adds) parts.push(`+${marker.adds}`);
          if (marker.removes) parts.push(`-${marker.removes}`);
          const label = parts.join("/");

          ctx.save();
          ctx.setLineDash([4, 3]);
          ctx.strokeStyle = color;
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + plotHeight); ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(x, pad.top);
          ctx.lineTo(x - 4, pad.top - 6);
          ctx.lineTo(x + 4, pad.top - 6);
          ctx.closePath();
          ctx.fill();
          ctx.font = "600 10px ui-sans-serif, system-ui, sans-serif";
          const labelWidth = ctx.measureText(label).width;
          const labelX = Math.min(Math.max(x - labelWidth / 2, pad.left), pad.left + plotWidth - labelWidth);
          ctx.fillText(label, labelX, pad.top - 9);
          ctx.restore();
        }
      }

      function nodeSort(a, b) {
        const ai = Number(String(a).split("-").pop());
        const bi = Number(String(b).split("-").pop());
        return Number.isFinite(ai) && Number.isFinite(bi) ? ai - bi : String(a).localeCompare(String(b));
      }
      function number(value) { return new Intl.NumberFormat("en-US").format(Number(value || 0)); }
      function compact(value) { return new Intl.NumberFormat("en-US", {notation: "compact", maximumFractionDigits: 1}).format(Number(value || 0)); }
      function percent(value) { return `${fixed(Number(value || 0) * 100, 1)}%`; }
      function fixed(value, digits) { return Number(value || 0).toFixed(digits); }
      function bytes(value) {
        const units = ["B", "KiB", "MiB", "GiB", "TiB"];
        let amount = Number(value || 0); let unit = 0;
        while (amount >= 1024 && unit < units.length - 1) { amount /= 1024; unit += 1; }
        return `${amount.toFixed(unit === 0 ? 0 : 2)} ${units[unit]}`;
      }
      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[char]);
      }
      function debounce(fn, delay) {
        let timer;
        return () => { clearTimeout(timer); timer = setTimeout(fn, delay); };
      }
    })();
  </script>
</body>
</html>
